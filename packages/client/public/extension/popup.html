<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      padding: 14px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      margin: 0;
      color: #111;
    }
    p { margin: 0 0 4px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      margin: 6px 0;
    }
    button {
      width: 100%;
      padding: 7px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 6px; font-size: 12px; color: #555; }
    #opening { color: #555; }
  </style>
</head>
<body>
  <div id="setup" style="display:none">
    <p>Enter your eeSimple server URL:</p>
    <input type="url" id="serverUrl" placeholder="http://eserve-raspi:3000">
    <button id="saveBtn">Save &amp; Open</button>
    <div id="status"></div>
  </div>
  <div id="opening">Opening eeSimple&hellip;</div>
  <script src="popup.js"></script>
</body>
</html>
