<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      position: relative;
      width: 260px;
      padding: 14px;
      padding-bottom: 18px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      margin: 0;
      color: #111;
    }
    p { margin: 0 0 4px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      margin: 6px 0;
    }
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      margin: 6px 0;
      min-height: 60px;
      resize: vertical;
    }
    button {
      width: 100%;
      padding: 7px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93b4f5; cursor: default; }
    .hidden { display: none; }
    #status, #formError {
      margin-top: 6px;
      font-size: 12px;
      min-height: 14px;
    }
    #status { color: #555; }
    #formError, #fillError, #inboxSavedError { color: #b91c1c; }
    #fillError { margin: 6px 0; font-size: 12px; }
    #inboxSavedError { margin-top: 6px; font-size: 12px; }
    #successMsg { font-weight: 600; }

    /* --- Fill mode --------------------------------------------------- */
    .fill-title { font-weight: 600; margin: 0 0 2px; word-break: break-word; }
    .fill-sub { color: #555; font-size: 12px; margin: 0 0 8px; }
    button.secondary { background: #fff; color: #2563eb; border: 1px solid #2563eb; }
    button.secondary:hover { background: #eff6ff; }
    button.danger { background: #fff; color: #b91c1c; border: 1px solid #b91c1c; }
    button.danger:hover { background: #fef2f2; }
    button.danger.confirming { background: #b91c1c; color: #fff; }
    #fillRows { margin: 4px 0 10px; }
    .fill-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      padding: 6px 0;
      border-top: 1px solid #eee;
    }
    .fill-row input[type="checkbox"] {
      width: auto;
      margin: 2px 0 0;
      flex: none;
    }
    .fill-row.disabled { opacity: 0.6; }
    .fill-body { flex: 1; min-width: 0; }
    .fill-label { font-weight: 600; font-size: 12px; }
    .fill-note { color: #555; font-size: 11px; }
    .fill-values { font-size: 12px; word-break: break-word; }
    .fill-current { color: #6b7280; text-decoration: line-through; }
    .fill-arrow { color: #9ca3af; }
    .fill-extracted { color: #111; }
    .fill-sections { font-size: 12px; margin-top: 2px; display: flex; flex-direction: column; gap: 1px; }
    .fill-sec-added    { color: #166534; }                                /* green, matches badge-new */
    .fill-sec-removed  { color: #6b7280; text-decoration: line-through; } /* matches fill-current */
    .fill-sec-changed  { color: #111; }
    .fill-sec-unchanged { color: #9ca3af; font-size: 11px; }
    .fill-term-select {
      margin: 2px 0 3px;
      max-width: 100%;
      font-size: 11px;
      padding: 1px 4px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
    }
    /* Rule groups — collapsible sections in the review list (expanded by default). */
    .fill-group { border-top: 1px solid #eee; }
    .fill-group-header {
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      color: #374151;
      padding: 6px 0;
      list-style: none;
    }
    .fill-group-header::-webkit-details-marker { display: none; }
    .fill-group-header::before { content: "▾ "; color: #9ca3af; }
    .fill-group:not([open]) > .fill-group-header::before { content: "▸ "; }
    .fill-group .fill-row { padding-left: 12px; }
    .fill-group-child { border-top: none; margin-left: 12px; }
    .fill-group-child > .fill-group-header { font-size: 11px; color: #6b7280; }

    .badge-new {
      display: inline-block;
      margin-left: 4px;
      padding: 0 5px;
      border-radius: 8px;
      background: #dcfce7;
      color: #166534;
      font-size: 10px;
      font-weight: 600;
      vertical-align: middle;
    }

    /* bottom countdown bar — duration (5000ms) must match the setTimeout in popup.js */
    #progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      background: #e5e7eb;
    }
    #progressBar {
      height: 100%;
      width: 100%;
      background: #2563eb;
      transform-origin: left center;
    }
    #progressBar.run {
      animation: countdown 5000ms linear forwards;
    }
    @keyframes countdown {
      from { transform: scaleX(1); }
      to { transform: scaleX(0); }
    }
  </style>
</head>
<body>
  <div id="setup" class="hidden">
    <p>Enter your eeSimple server URL:</p>
    <input type="url" id="serverUrl" placeholder="http://eserve-raspi:3000">
    <button id="saveBtn">Save</button>
    <div id="status"></div>
  </div>

  <div id="form" class="hidden">
    <p>Add this page:</p>
    <input type="url" id="bmUrl" placeholder="https://...">
    <button id="addBtn">Add to Inbox</button>
    <button id="addBookmarkBtn" class="secondary" style="margin-top:6px">Add as Bookmark</button>
    <div id="formError"></div>
  </div>

  <div id="success" class="hidden">
    <p id="successMsg">Queued in Inbox.</p>
    <button id="viewInboxBtn">View Inbox</button>
    <button id="captureSuccessBtn" class="secondary hidden" style="margin-top:6px">Capture screenshot</button>
    <div id="captureSuccessStatus" class="fill-note"></div>
    <button id="deleteSuccessBtn" class="danger hidden" style="margin-top:6px">Delete bookmark</button>
    <div id="deleteSuccessStatus" class="fill-note"></div>
  </div>

  <div id="inboxSaved" class="hidden">
    <p id="inboxSavedMsg" class="fill-title">Saved to Inbox.</p>
    <button id="moveToBookmarksBtn">Move to Bookmarks</button>
    <button id="inboxSavedViewBtn" class="secondary" style="margin-top:6px">View Inbox</button>
    <button id="inboxUndoBtn" class="danger hidden" style="margin-top:6px">Undo</button>
    <div id="inboxSavedError" class="hidden"></div>
  </div>

  <div id="savedState" class="hidden">
    <p>This page is already saved.</p>
    <textarea id="savedDescription" placeholder="Description"></textarea>
    <button id="saveDescriptionBtn">Save description</button>
    <div id="saveDescriptionStatus" class="fill-note"></div>
    <button id="savedOpenBtn" class="secondary" style="margin-top:6px">Open Bookmark</button>
    <button id="findSelectorSavedBtn" class="secondary hidden" style="margin-top:6px">Find a selector</button>
    <div id="findSelectorSavedStatus" class="fill-note"></div>
    <button id="captureSavedBtn" class="secondary hidden" style="margin-top:6px">Capture screenshot</button>
    <div id="captureSavedStatus" class="fill-note"></div>
    <button id="deleteSavedBtn" class="danger hidden" style="margin-top:6px">Delete bookmark</button>
    <div id="deleteSavedStatus" class="fill-note"></div>
  </div>

  <div id="fillFilling" class="hidden">
    <p id="fillFillingTitle" class="fill-title"></p>
    <p class="fill-sub">Reading the page…</p>
  </div>

  <div id="fillReview" class="hidden">
    <p id="fillReviewTitle" class="fill-title"></p>
    <p class="fill-sub">Review the values to apply, then click Apply.</p>
    <div id="fillError" class="hidden"></div>
    <div id="fillRows"></div>
    <button id="fillApplyBtn">Apply</button>
    <button id="fillReviewOpenBtn" class="secondary">Open Bookmark</button>
    <textarea id="reviewDescription" class="hidden" placeholder="Description" style="margin-top:6px"></textarea>
    <button id="saveReviewDescriptionBtn" class="secondary hidden">Save description</button>
    <div id="saveReviewDescriptionStatus" class="fill-note"></div>
    <button id="findSelectorReviewBtn" class="secondary hidden" style="margin-top:6px">Find a selector</button>
    <div id="findSelectorReviewStatus" class="fill-note"></div>
    <button id="captureReviewBtn" class="secondary hidden" style="margin-top:6px">Capture screenshot</button>
    <div id="captureReviewStatus" class="fill-note"></div>
  </div>

  <div id="fillApplied" class="hidden">
    <p id="fillAppliedMsg" class="fill-title">Updated 0 fields.</p>
    <button id="fillAppliedOpenBtn">Open Bookmark</button>
    <textarea id="appliedDescription" class="hidden" placeholder="Description" style="margin-top:6px"></textarea>
    <button id="saveAppliedDescriptionBtn" class="secondary hidden">Save description</button>
    <div id="saveAppliedDescriptionStatus" class="fill-note"></div>
    <button id="captureAppliedBtn" class="secondary hidden" style="margin-top:6px">Capture screenshot</button>
    <div id="captureAppliedStatus" class="fill-note"></div>
    <button id="deleteAppliedBtn" class="danger hidden" style="margin-top:6px">Delete bookmark</button>
    <div id="deleteAppliedStatus" class="fill-note"></div>
  </div>

  <div id="selectorPrefill" class="hidden">
    <p class="fill-title">New extension fill rule</p>
    <div id="prefillSummary" class="fill-values" style="margin-bottom:6px"></div>
    <input type="text" id="prefillLabel" placeholder="Rule label">
    <select id="prefillTarget" style="width:100%;box-sizing:border-box;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;margin:6px 0"></select>
    <select id="prefillEntryType" class="hidden" style="width:100%;box-sizing:border-box;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;margin:6px 0">
      <option value="name">Entry type: Name (titled list)</option>
      <option value="url">Entry type: URL</option>
      <option value="page">Entry type: Page number</option>
      <option value="timestamp">Entry type: Timestamp</option>
    </select>
    <button id="prefillCreateBtn">Create draft rule &amp; open editor</button>
    <button id="prefillDiscardBtn" class="danger" style="margin-top:6px">Discard</button>
    <div id="prefillError" class="fill-note"></div>
  </div>

  <div id="progress" class="hidden"><div id="progressBar"></div></div>
  <script src="taxonomyFill.js"></script>
  <script src="popup.js"></script>
</body>
</html>
