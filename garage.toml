# Garage object-storage config for local development (single node).
# Bookmark images are stored here via the S3 API on :3900.
#
# For PRODUCTION: generate your own rpc_secret and admin_token, e.g.:
#   openssl rand -hex 32
# and keep them out of version control.

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"
rpc_secret = "246cf2142ddec4f987e9c3f4b744c6fe6d44b09a90f1443f0ae28fc93b2aca25"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.local"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "246cf2142ddec4f987e9c3f4b744c6fe6d44b09a90f1443f0ae28fc93b2aca25"
